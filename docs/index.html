<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thai Text Segmenter System Demo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f7f7f7;
      color: #111;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      line-height: 1.6;
      color: #444;
    }

    .video-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      margin-top: 24px;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>
  <h1>Thai Text Segmenter System Demo</h1>

  <p>
    This video demonstrates the workflow of the Thai Text Segmenter System,
    including HTML file upload, text input, segmentation processing and history tracking.
  </p>

  <div class="video-container">
    <iframe
      src="https://www.youtube.com/embed/ETCGHgNMFzw"
      title="Thai Text Segmenter System Demo"
      allowfullscreen>
    </iframe>
  </div>

</html>
